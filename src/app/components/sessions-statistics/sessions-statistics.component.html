<div class="statistics-container">
  <!-- Stats Cards -->
  <div class="stats-grid">
    <div *ngFor="let stat of statsCards" class="stat-card" [style.border-left-color]="stat.color">
      <div class="stat-icon" [style.background-color]="stat.color + '15'">
        <i class="fas" [ngClass]="stat.icon" [style.color]="stat.color"></i>
      </div>
      <div class="stat-content">
        <h4 class="stat-value">{{ stat.value }}</h4>
        <p class="stat-title">{{ stat.title }}</p>
        <span *ngIf="stat.percentage !== undefined" class="stat-percentage"> {{ stat.percentage }}% del total </span>
      </div>
    </div>
  </div>

  <!-- Charts Section -->
  <div class="charts-section" *ngIf="sessions.length > 0">
    <!-- Entity Distribution (Usuario vs Congregación) -->
    <div class="chart-card">
      <div class="chart-header">
        <h4 class="chart-title">
          <i class="fas fa-users"></i>
          Usuarios vs Congregaciones
        </h4>
      </div>
      <div class="chart-container">
        <ngx-charts-pie-chart
          [results]="entityChartData"
          [view]="view"
          [legend]="showLegend"
          [legendPosition]="legendPosition"
          [labels]="showLabels"
          [doughnut]="isDoughnut"
          (select)="onSelect($event)"
        >
        </ngx-charts-pie-chart>
      </div>
    </div>

    <!-- Device Distribution -->
    <div class="chart-card">
      <div class="chart-header">
        <h4 class="chart-title">
          <i class="fas fa-chart-pie"></i>
          Distribución por Dispositivo
        </h4>
      </div>
      <div class="chart-container">
        <ngx-charts-pie-chart
          [results]="deviceChartData"
          [view]="view"
          [legend]="showLegend"
          [legendPosition]="legendPosition"
          [labels]="showLabels"
          [doughnut]="isDoughnut"
          (select)="onSelect($event)"
        >
        </ngx-charts-pie-chart>
      </div>
    </div>

    <!-- Country Distribution -->
    <div class="chart-card">
      <div class="chart-header">
        <h4 class="chart-title">
          <i class="fas fa-chart-bar"></i>
          Top 5 Países
        </h4>
      </div>
      <div class="chart-container">
        <ngx-charts-bar-vertical
          [results]="countryChartData"
          [view]="view"
          [xAxis]="true"
          [yAxis]="true"
          [showXAxisLabel]="false"
          [showYAxisLabel]="false"
          [gradient]="true"
          (select)="onSelect($event)"
        >
        </ngx-charts-bar-vertical>
      </div>
    </div>

    <!-- Browser Distribution -->
    <div class="chart-card">
      <div class="chart-header">
        <h4 class="chart-title">
          <i class="fas fa-globe"></i>
          Navegadores Más Usados
        </h4>
      </div>
      <div class="chart-container">
        <ngx-charts-bar-horizontal
          [results]="browserChartData"
          [view]="view"
          [scheme]="colorScheme"
          [yAxis]="true"
          [showXAxisLabel]="false"
          [showYAxisLabel]="false"
          [gradient]="true"
          (select)="onSelect($event)"
        >
        </ngx-charts-bar-horizontal>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-charts" *ngIf="sessions.length === 0">
    <i class="fas fa-chart-line"></i>
    <p>No hay datos suficientes para mostrar gráficos</p>
  </div>
</div>

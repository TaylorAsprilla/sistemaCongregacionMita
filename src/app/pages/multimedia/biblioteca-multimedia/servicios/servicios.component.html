<div class="row">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h3 class="card-title mb-0">Biblioteca de Servicios y Vigilias Nuev</h3>
      <div class="d-flex align-items-center gap-2" title="{{ sesionesActivas }} sesiones activas">
        <span class="rounded-circle bg-success" style="width: 10px; height: 10px"></span>
        <span class="fw-semibold">{{ sesionesActivas }}</span>
      </div>
    </div>

    <div class="servicios-container">
      <!-- Formulario de búsqueda -->
      <div class="search-container">
        <form (ngSubmit)="applyFilters()">
          <input type="text" [(ngModel)]="searchTitle" name="searchTitle" placeholder="Buscar por título" />
          <input type="date" [(ngModel)]="searchDate" name="searchDate" placeholder="Buscar por fecha" />
          <button type="submit">Buscar</button>
        </form>
      </div>

      <!-- Mensaje de carga -->
      @if (loading) {
        <div class="loading-message">Cargando videos...</div>
      }

      <!-- Lista de videos -->
      @if (!loading) {
        <div class="video-library">
          @for (video of visibleVideos; track video.id) {
            <div class="video-item">
              <h3>{{ video.titulo }}</h3>
              <p>{{ video.fecha | date }}</p>

              <div
                class="smartvideo swarm-fluid"
                controls
                playsinline
                width="500"
                height="281"
                [attr.src]="video.link"
              ></div>
            </div>
          }
        </div>
      }

      <!-- Botón para cargar más videos -->
      @if (hasMoreVideos && !loading) {
        <button (click)="loadMore()" class="load-more-button">Cargar más videos</button>
      }
    </div>
  </div>
</div>
